version: '3.8'

services:
  app:
    container_name: namoland-app
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - AUTH_SECRET=${AUTH_SECRET}
      - TZ=Asia/Bangkok
    volumes:
      - ./uploads:/app/public/uploads

  caddy:
    image: caddy:2-alpine
    container_name: namoland-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./caddy_data:/data
      - ./caddy_config:/config
    depends_on:
      - app
